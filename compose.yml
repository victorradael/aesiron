networks:
  aesiron-net:
    external: true

services:

  build_keeper:
    build: ./apps/build_keeper
    image: app-aesiron-build_keeper
    container_name: app-aesiron-build_keeper
    volumes:
      - ./apps/build_keeper/app:/app
    ports:
      - "8503:8503"
    env_file:
      - ./apps/build_keeper/.env
    networks:
      - aesiron-net
